/* ===================== COULEURS ===================== */
const BG='#0f172a',CARD='#1e293b',BORDER='#334155',TXT='#e2e8f0',MUT='#64748b',MUT2='#94a3b8';

/* ===================== UTILITAIRES ===================== */
const eur=n=>{const neg=n<0,abs=Math.abs(n);return(neg?'−':'')+abs.toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2})+'\u00a0€';};
const short=n=>{const neg=n<0,abs=Math.abs(n);return(neg?'−':'')+(abs>=1000?(abs/1000).toFixed(1)+'k':abs.toFixed(0))+'€';};
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const todayStr=()=>new Date().toISOString().split('T')[0];
const DKEY='jf_data_v3',SKEY='jf_settings_v1',SETUP_KEY='jf_setup_done';

   ================================= */

/* ===================== PERSISTANCE ===================== */
const loadData=()=>{try{const r=localStorage.getItem(DKEY);return r?JSON.parse(r):null;}catch{return null;}};
const saveData=d=>{try{localStorage.setItem(DKEY,JSON.stringify(d));}catch{}};
const loadSettings=()=>{try{const r=localStorage.getItem(SKEY);return r?JSON.parse(r):{driveUrl:'',autoSync:false,lastSync:null};}catch{return{driveUrl:'',autoSync:false,lastSync:null,notifEmail:'',emailReminder:false,emailTime:'21:00',userName:'',googleConnected:false};}};
const saveSettings=s=>{try{localStorage.setItem(SKEY,JSON.stringify(s));}catch{}};

/* ===================== ÉTAT ===================== */
let state={
  tab:'home',
  wizard:null,
  accounts:INIT_ACCOUNTS,envelopes:INIT_ENVELOPES,txs:[],debts:INIT_DEBTS,owedDebts:[],
  addForm:{typeId:'depense',amt:'',accId:'hello',fromId:'sg',toId:'hello',desc:'',person:'',date:todayStr()},
  histFilter:'all',

/* ===================== TOAST ===================== */
function showToast(msg,ok=true,dur=2200){
  if(state.toastTmr)clearTimeout(state.toastTmr);
  const tmr=setTimeout(()=>setState({toast:null,toastTmr:null}),dur);
  setState({toast:{msg,ok},toastTmr:tmr});
}

/* ===================== LOGIQUE ===================== */
function setState(patch,rerender=true){
  Object.assign(state,patch);
  if(rerender){render();persist();}else{persist();}
}
function persist(){
  saveData({accounts:state.accounts,envelopes:state.envelopes,txs:state.txs,debts:state.debts,owedDebts:state.owedDebts});
}

function init(){
  const saved=loadData();
  if(saved){
    if(saved.accounts)state.accounts=saved.accounts.map(a=>({...a,isSavings:a.isSavings===true}));
    if(saved.envelopes)state.envelopes=saved.envelopes;
    if(saved.txs)state.txs=saved.txs;
    if(saved.debts)state.debts=saved.debts;
    if(saved.owedDebts)state.owedDebts=saved.owedDebts;
  }
  state.settings=loadSettings();
  // Détecter premier lancement
  const setupDone=localStorage.getItem(SETUP_KEY);
  if(!setupDone){
    state.wizard={step:0,
      name:'',
      accounts:[
        {id:uid(),name:'',bal:'0',color:'#3b82f6'},
      ],
      envelopes:[
        {id:uid(),name:'Épargne',rate:'55',color:'#10b981'},
        {id:uid(),name:'Arg. de poche',rate:'25',color:'#3b82f6'},
        {id:uid(),name:'Dîme',rate:'10',color:'#f59e0b'},
        {id:uid(),name:'Aide',rate:'5',color:'#ec4899'},
        {id:uid(),name:'Loisir',rate:'5',color:'#8b5cf6'},
      ]
    };
  }
  render();
  if(state.settings.autoSync&&state.settings.driveUrl)checkAutoSync();
}


/* Notifications push supprimées */

/* ===================== REMBOURSER MA DETTE ===================== */
function repayOwed(did,amt,accId,note){
  amt=parseFloat(String(amt).replace(',','.'))||0;
  if(amt<=0){showToast('Montant invalide',false);return;}
  const d=state.owedDebts.find(x=>x.id===did);
  if(!d)return;
  // Surpaiement
  if(amt>d.rem){
    const surplus=+(amt-d.rem).toFixed(2);
    setState({owedModal:{...d,_overpay:{amt,accId,note,surplus}}});
    return;
  }
  const realAmt=+(Math.min(amt,d.rem)).toFixed(2);
  const entry={id:uid(),amount:realAmt,date:todayStr(),note:note||''};
  state.owedDebts=state.owedDebts.map(x=>x.id===did
    ?{...x,rem:Math.max(0,+(x.rem-realAmt).toFixed(2)),history:[...(x.history||[]),entry]}:x);
  state.accounts=state.accounts.map(a=>a.id===accId?{...a,bal:+(a.bal-realAmt).toFixed(2)}:a);
  state.txs=[{id:uid(),typeId:'rembDonne',amount:realAmt,accId,person:d.creditor,
    desc:(note?note+' — ':'')+'Remboursement à '+d.creditor,
    date:todayStr(),createdAt:new Date().toISOString()},...state.txs];
  setState({owedModal:null});
  showToast('Remboursement de '+eur(realAmt)+' enregistré ✓',true);
}

/* ===================== RESET À ZÉRO ===================== */
function resetToZero(){
  // Garde la structure (comptes, enveloppes) mais met tout à 0, vide l\u2019historique
  state.accounts=state.accounts.map(a=>({...a,bal:0}));
  state.envelopes=state.envelopes.map(e=>({...e,bal:0}));
  state.txs=[];
  state.debts=[];
  setState({});
  showToast('Journal réinitialisé à zéro ✓',true);
}

/* ===================== SYNC GOOGLE DRIVE ===================== */
async function syncToDrive(manual=false){
  const url=state.settings.driveUrl.trim();
  if(!url){return;} // URL Apps Script non configurée → silencieux
  setState({syncStatus:'syncing'});
  try{
    const payload=JSON.stringify({accounts:state.accounts,envelopes:state.envelopes,txs:state.txs,debts:state.debts,syncedAt:new Date().toISOString(),reminderEmail:state.settings.notifEmail,reminderTime:state.settings.emailTime,emailReminder:state.settings.emailReminder});
    await fetch(url,{method:'POST',mode:'no-cors',body:payload});
    const newSettings={...state.settings,lastSync:new Date().toISOString()};
    state.settings=newSettings;
    saveSettings(newSettings);
    setState({syncStatus:'ok'});
    if(manual)showToast('Sauvegardé sur Drive ✓',true);
    setTimeout(()=>setState({syncStatus:null}),3000);
  }catch(e){
    setState({syncStatus:'err'});
    if(manual)showToast('Erreur de connexion',false);
    setTimeout(()=>setState({syncStatus:null}),3000);
  }
}

function checkAutoSync(){
  const last=state.settings.lastSync;
  if(!last){syncToDrive();return;}
  const diff=(Date.now()-new Date(last).getTime())/(1000*60*60);
  if(diff>=24)syncToDrive();
}

/* ===================== EXPORT JSON ===================== */
function exportJSON(){
  const data={accounts:state.accounts,envelopes:state.envelopes,txs:state.txs,debts:state.debts,exportedAt:new Date().toISOString(),version:2};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='journal_financier_'+todayStr()+'.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('Fichier exporté ✓',true);
}

/* ===================== IMPORT JSON ===================== */
function importJSON(){
  document.getElementById('file-import').click();
}
document.getElementById('file-import').addEventListener('change',e=>{
  const file=e.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(!data.accounts||!data.envelopes){showToast('Fichier invalide',false);return;}
      if(confirm('Remplacer toutes les données par ce fichier ?')){
        state.accounts=data.accounts;
        state.envelopes=data.envelopes;
        state.txs=data.txs||[];
        state.debts=data.debts||[];
        setState({});
        showToast('Données restaurées ✓',true);
      }
    }catch{showToast('Fichier corrompu',false);}
  };
  reader.readAsText(file);
  e.target.value='';
});

/* ===================== OPÉRATIONS ===================== */
function addTx(f){
  const tp=TYPES.find(x=>x.id===f.typeId);
  const amt=parseFloat(f.amt.replace(',','.'))||0;
  if(amt<=0){showToast('Montant invalide',false);return;}
  if(tp.dir==='xfr'&&f.fromId===f.toId){showToast('Comptes identiques',false);return;}
  if(f.typeId==='rembRecv'&&!f.person.trim()){showToast('Sélectionne la personne qui rembourse',false);return;}
  if(f.typeId==='rembDonne'&&!f.person.trim()){showToast('Sélectionne le créancier à rembourser',false);return;}
  const tx={id:uid(),typeId:f.typeId,amount:amt,accId:tp.dir==='xfr'?null:f.accId,fromId:tp.dir==='xfr'?f.fromId:null,toId:tp.dir==='xfr'?f.toId:null,desc:f.desc.trim(),person:f.person.trim(),date:f.date,createdAt:new Date().toISOString()};
  state.txs=[tx,...state.txs];
  if(tp.dir==='in'){
    state.accounts=state.accounts.map(a=>a.id===f.accId?{...a,bal:+(a.bal+amt).toFixed(2)}:a);
    if(tp.env==='auto')state.envelopes=state.envelopes.map(e=>({...e,bal:+(e.bal+amt*e.rate).toFixed(2)}));
    // Emprunt reçu → créer/mettre à jour ma dette
    if(f.typeId==='emprunt'&&f.person.trim()){
      const cName=f.person.trim();
      const existing=state.owedDebts.find(d=>d.creditor.toLowerCase()===cName.toLowerCase()&&d.rem>0);
      if(existing){
        state.owedDebts=state.owedDebts.map(d=>d.id===existing.id
          ?{...d,total:+(d.total+amt).toFixed(2),rem:+(d.rem+amt).toFixed(2),
            note:d.note?(d.note+' | '+f.desc.trim()):f.desc.trim()}
          :d);
      }else{
        state.owedDebts=[{id:uid(),creditor:cName,total:amt,rem:amt,
          note:f.desc.trim(),history:[]},...state.owedDebts];
      }
    }
    // Si remboursement reçu → mettre à jour la dette correspondante
    if(f.typeId==='rembRecv'&&f.person.trim()){
      const pName=f.person.trim();
      const debtMatch=state.debts.find(d=>
        d.person.toLowerCase()===pName.toLowerCase()&&d.rem>0
      );
      if(debtMatch){
        // Surpaiement depuis onglet Saisir → avertissement toast + plafonnement auto
        if(amt>debtMatch.rem){
          const surplus=+(amt-debtMatch.rem).toFixed(2);
          // On enregistre le surplus comme bénéfice séparé automatiquement
          state.accounts=state.accounts.map(a=>a.id===f.accId?{...a,bal:+(a.bal+surplus).toFixed(2)}:a);
          state.txs=[{id:uid(),typeId:'benef',amount:surplus,accId:f.accId,person:pName,
            desc:'Surplus remboursement '+pName,date:f.date||todayStr(),
            createdAt:new Date().toISOString()},...state.txs];
          const entry={id:uid(),amount:debtMatch.rem,date:f.date||todayStr(),note:f.desc.trim()};
          state.debts=state.debts.map(d=>d.id===debtMatch.id
            ?{...d,rem:0,history:[...(d.history||[]),entry]}:d);
          showToast('Dette soldée + '+eur(surplus)+' en bénéfice ✓',true,4000);
          setState({addForm:{...state.addForm,amt:'',desc:'',person:'',date:todayStr()}});
          if(state.settings.autoSync&&state.settings.driveUrl)setTimeout(()=>syncToDrive(),1000);
  if(state.settings.autoSync&&gAccessToken)setTimeout(()=>syncToGoogleDrive(false),1500);
          return;
        }
        const entry={id:uid(),amount:amt,date:f.date||todayStr(),note:f.desc.trim()};
        state.debts=state.debts.map(d=>d.id===debtMatch.id
          ?{...d,rem:Math.max(0,+(d.rem-amt).toFixed(2)),history:[...(d.history||[]),entry]}:d);
      }
    }
  }else if(tp.dir==='out'){
    state.accounts=state.accounts.map(a=>a.id===f.accId?{...a,bal:+(a.bal-amt).toFixed(2)}:a);
    if(tp.env&&tp.env!=='auto')state.envelopes=state.envelopes.map(e=>e.id===tp.env?{...e,bal:+(e.bal-amt).toFixed(2)}:e);
    if(f.typeId==='pret'&&f.person.trim()){
      const pName=f.person.trim();
      const existing=state.debts.find(d=>d.person.toLowerCase()===pName.toLowerCase()&&d.rem>0);
      if(existing){
        // Ajoute au prêt existant
        state.debts=state.debts.map(d=>d.id===existing.id
          ?{...d,total:+(d.total+amt).toFixed(2),rem:+(d.rem+amt).toFixed(2),
            note:d.note?(d.note+' | '+f.desc.trim()):f.desc.trim()}
          :d);
      }else{
        state.debts=[{id:uid(),person:pName,total:amt,rem:amt,note:f.desc.trim(),history:[]},...state.debts];
      }
    }
    // Remboursement que je fais → mettre à jour ma dette
    if(f.typeId==='rembDonne'&&f.person.trim()){
      const cName=f.person.trim();
      const debtMatch=state.owedDebts.find(d=>d.creditor.toLowerCase()===cName.toLowerCase()&&d.rem>0);
      if(debtMatch){
        if(amt>debtMatch.rem){
          // Surpaiement : plafonner + avertir
          const realAmt=debtMatch.rem;
          const surplus=+(amt-realAmt).toFixed(2);
          // Rembourse seulement ce qui reste
          state.accounts=state.accounts.map(a=>a.id===f.accId?{...a,bal:+(a.bal+surplus).toFixed(2)}:a);
          const entry={id:uid(),amount:realAmt,date:f.date||todayStr(),note:f.desc.trim()};
          state.owedDebts=state.owedDebts.map(d=>d.id===debtMatch.id
            ?{...d,rem:0,history:[...(d.history||[]),entry]}:d);
          showToast('Dette soldée. Surplus '+eur(surplus)+' recrédité ✓',true,4000);
          setState({addForm:{...state.addForm,amt:'',desc:'',person:'',date:todayStr()}});
          return;
        }
        const entry={id:uid(),amount:amt,date:f.date||todayStr(),note:f.desc.trim()};
        state.owedDebts=state.owedDebts.map(d=>d.id===debtMatch.id
          ?{...d,rem:Math.max(0,+(d.rem-amt).toFixed(2)),history:[...(d.history||[]),entry]}:d);
      }
    }
  }else if(tp.dir==='xfr'){
    state.accounts=state.accounts.map(a=>{if(a.id===f.fromId)return{...a,bal:+(a.bal-amt).toFixed(2)};if(a.id===f.toId)return{...a,bal:+(a.bal+amt).toFixed(2)};return a;});
  }
  setState({addForm:{...state.addForm,amt:'',desc:'',person:'',date:todayStr()}});
  showToast('Opération enregistrée ✓',true);
  if(state.settings.autoSync&&state.settings.driveUrl)setTimeout(()=>syncToDrive(),1000);
  if(state.settings.autoSync&&gAccessToken)setTimeout(()=>syncToGoogleDrive(false),1500);
}

function repayDebt(did,amtStr,accId,note,forceMode){
  const amt=parseFloat((amtStr||'').replace(',','.'))||0;
  if(amt<=0){showToast('Montant invalide',false);return;}
  const d=state.debts.find(x=>x.id===did);
  if(!d)return;

  // Surpaiement détecté
  if(amt>d.rem&&!forceMode){
    const surplus=+(amt-d.rem).toFixed(2);
    setState({debtModal:{...d,_overpay:{amt,accId,note,surplus}}});
    return;
  }

  // forceMode='cap' → plafonner à d.rem | forceMode='full' → accepter le surplus comme bénéfice
  const realAmt = forceMode==='cap' ? d.rem : amt;
  const surplusAmt = forceMode==='full' ? +(amt-d.rem).toFixed(2) : 0;

  const entry={id:uid(),amount:realAmt,date:todayStr(),note:note||''};
  state.debts=state.debts.map(x=>x.id===did
    ?{...x,rem:Math.max(0,+(x.rem-realAmt).toFixed(2)),
      history:[...(x.history||[]),entry]}
    :x);
  state.accounts=state.accounts.map(a=>a.id===accId?{...a,bal:+(a.bal+realAmt).toFixed(2)}:a);
  state.txs=[{id:uid(),typeId:'rembRecv',amount:realAmt,accId,person:d.person,
    desc:(note?note+' — ':'')+'Remboursement '+d.person,date:todayStr(),
    createdAt:new Date().toISOString()},...state.txs];

  // Si surplus accepté → enregistrer comme bénéfice séparé
  if(surplusAmt>0){
    state.accounts=state.accounts.map(a=>a.id===accId?{...a,bal:+(a.bal+surplusAmt).toFixed(2)}:a);
    state.txs=[{id:uid(),typeId:'benef',amount:surplusAmt,accId,person:d.person,
      desc:'Surplus remboursement '+d.person,date:todayStr(),
      createdAt:new Date().toISOString()},...state.txs];
  }

  setState({debtModal:null});
  showToast(forceMode==='cap'
    ? 'Plafonné à '+eur(realAmt)+' (dette soldée) ✓'
    : forceMode==='full'
      ? 'Remboursement enregistré + '+eur(surplusAmt)+' en bénéfice ✓'
      : 'Remboursement enregistré ✓',
    true);
}

/* ===================== CONSTRUCTEUR DOM ===================== */
function el(tag,attrs,children){
  const e=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==='style')Object.assign(e.style,v);
    else if(k==='onClick')e.addEventListener('click',v);
    else if(k==='onChange')e.addEventListener('change',v);
    else if(k==='onInput')e.addEventListener('input',v);
    else if(k==='className')e.className=v;
    else e.setAttribute(k,v);
  });
  if(children)[].concat(children).filter(c=>c!=null&&c!==false).forEach(c=>e.appendChild(typeof c==='string'?document.createTextNode(c):c));
  return e;
}
function mkInp(val,ph,onch,type='text',extra={},rerender=false){
  const i=el('input',{type,placeholder:ph,style:{width:'100%',background:BG,border:`1px solid ${BORDER}`,borderRadius:10,padding:'11px 13px',color:TXT,fontSize:15,outline:'none',...extra}});
  if(type==='number')i.setAttribute('inputmode','decimal');
  i.value=val||'';
  i.addEventListener('input',e=>{onch(e.target.value,rerender);});
  return i;
}
function mkSelect(val,opts,onch){
  const s=el('select',{style:{width:'100%',background:BG,border:`1px solid ${BORDER}`,borderRadius:10,padding:'11px 13px',color:TXT,fontSize:14,outline:'none',appearance:'none',WebkitAppearance:'none'}});
  opts.forEach(o=>{const op=el('option',{value:o.value},o.label);if(o.value===val)op.selected=true;s.appendChild(op);});
  s.addEventListener('change',e=>onch(e.target.value));
  return s;
}

function mkBtn(txt,color,onclick,extra={}){return el('button',{style:{background:color,color:'white',border:'none',borderRadius:12,padding:'13px',fontSize:15,fontWeight:700,cursor:'pointer',width:'100%',...extra},onClick:onclick},txt);}
function secTitle(t){return el('div',{style:{fontSize:10,color:MUT,fontWeight:700,letterSpacing:'0.09em',textTransform:'uppercase',padding:'14px 16px 8px'}},t);}

/* ===================== TOGGLE HELPER ===================== */
function mkToggle(active, onclick){
  const wrap=el('div',{style:{position:'relative',cursor:'pointer',userSelect:'none',touchAction:'manipulation',WebkitTapHighlightColor:'transparent',padding:'8px 0 8px 8px'}});
  const track=el('div',{style:{width:48,height:28,borderRadius:14,background:active?'#10b981':'#334155',position:'relative',transition:'background 0.2s',pointerEvents:'none'}});
  const thumb=el('div',{style:{width:22,height:22,borderRadius:11,background:'white',position:'absolute',top:3,left:active?23:3,transition:'left 0.15s',pointerEvents:'none'}});
  track.appendChild(thumb);wrap.appendChild(track);
  wrap.addEventListener('click',onclick);
  wrap.addEventListener('touchend',e=>{e.preventDefault();onclick(e);});
  return wrap;
}


/* ===================== WIZARD PREMIER LANCEMENT ===================== */
function finishWizard(){
  const wz=state.wizard;
  // Appliquer nom utilisateur
  const ns={...state.settings,userName:wz.name.trim()||'Utilisateur'};
  state.settings=ns;saveSettings(ns);
  // Appliquer comptes (filtrer ceux avec un nom)
  const validAccounts=wz.accounts.filter(a=>a.name.trim()).map(a=>({
    id:a.id,
    name:a.name.trim(),
    bal:parseFloat(String(a.bal).replace(',','.'))||0,
    color:a.color,
    abbr:a.name.trim().slice(0,2).toUpperCase(),
    isSavings:a.isSavings||false
  }));
  if(validAccounts.length>0)state.accounts=validAccounts;
  // Appliquer enveloppes
  const validEnv=wz.envelopes.filter(e=>e.name.trim()&&parseFloat(e.rate)>0).map(e=>({
    id:e.id,name:e.name.trim(),bal:0,
    rate:parseFloat(e.rate)/100,color:e.color
  }));
  if(validEnv.length>0)state.envelopes=validEnv;
  localStorage.setItem(SETUP_KEY,'1');
  setState({wizard:null});
}

/* ===================== GOOGLE DRIVE OAUTH & API ===================== */

function initGoogleAuth(){
  if(!GOOGLE_CLIENT_ID||GOOGLE_CLIENT_ID.includes('VOTRE_CLIENT_ID'))return;
  if(typeof google==='undefined')return;
  gTokenClient=google.accounts.oauth2.initTokenClient({
    client_id:GOOGLE_CLIENT_ID,
    scope:DRIVE_SCOPE,
    callback:(resp)=>{
      if(resp.error){
        showToast('Connexion Google échouée',false,4000);
        setState({syncStatus:'err'});
        return;
      }
      gAccessToken=resp.access_token;
      const ns={...state.settings,googleConnected:true};
      state.settings=ns;saveSettings(ns);
      setState({syncStatus:'ok'});
      showToast('Google Drive connecté ✓',true,3000);
      // Chercher fichier existant puis synchroniser
      findOrCreateDriveFile().then(()=>syncToGoogleDrive(false));
    }
  });
}

async function connectGoogle(){
  if(!GOOGLE_CLIENT_ID||GOOGLE_CLIENT_ID.includes('VOTRE_CLIENT_ID')){
    showToast('Client ID non configuré',false,4000);return;
  }
  if(typeof google==='undefined'){
    showToast('Librairie Google non chargée',false,4000);return;
  }
  setState({syncStatus:'syncing'});
  gTokenClient.requestAccessToken({prompt:'consent'});
}

function disconnectGoogle(){
  if(gAccessToken&&typeof google!=='undefined'){
    google.accounts.oauth2.revoke(gAccessToken,()=>{});
  }
  gAccessToken=null;gFileId=null;
  const ns={...state.settings,googleConnected:false};
  state.settings=ns;saveSettings(ns);
  setState({syncStatus:null});
  showToast('Déconnecté de Google Drive',true,2000);
}

async function driveRequest(url,method='GET',body=null,isMedia=false){
  if(!gAccessToken)throw new Error('Non connecté');
  const headers={'Authorization':'Bearer '+gAccessToken};
  if(!isMedia&&body)headers['Content-Type']='application/json';
  const opts={method,headers};
  if(body)opts.body=isMedia?body:JSON.stringify(body);
  const resp=await fetch(url,opts);
  if(resp.status===401){
    // Token expiré → reconnecter
    gAccessToken=null;
    const ns={...state.settings,googleConnected:false};
    state.settings=ns;saveSettings(ns);
    showToast('Session expirée — reconnecte Google Drive',false,5000);
    setState({syncStatus:'err'});
    throw new Error('Token expired');
  }
  return resp;
}

async function findOrCreateDriveFile(){
  if(gFileId)return gFileId;
  try{
    // Chercher fichier existant
    const q=encodeURIComponent(`name='${DRIVE_FILE_NAME}' and trashed=false`);
    const r=await driveRequest(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)`);
    const data=await r.json();
    if(data.files&&data.files.length>0){
      gFileId=data.files[0].id;
    }else{
      // Créer le fichier vide
      const meta={name:DRIVE_FILE_NAME,mimeType:'application/json'};
      const cr=await driveRequest('https://www.googleapis.com/drive/v3/files','POST',meta);
      const cdata=await cr.json();
      gFileId=cdata.id;
    }
    return gFileId;
  }catch(e){
    console.error('findOrCreateDriveFile:',e);throw e;
  }
}

async function syncToGoogleDrive(manual=true){
  if(!gAccessToken){
    if(manual)showToast('Connecte d\'abord Google Drive',false,3000);
    return;
  }
  setState({syncStatus:'syncing'});
  try{
    await findOrCreateDriveFile();
    const payload=JSON.stringify({
      accounts:state.accounts,envelopes:state.envelopes,
      txs:state.txs,debts:state.debts,owedDebts:state.owedDebts,
      syncedAt:new Date().toISOString(),version:3
    });
    // Upload multipart
    const boundary='jf_boundary_'+Date.now();
    const body=[
      '--'+boundary,
      'Content-Type: application/json; charset=UTF-8',
      '',
      JSON.stringify({name:DRIVE_FILE_NAME,mimeType:'application/json'}),
      '--'+boundary,
      'Content-Type: application/json',
      '',
      payload,
      '--'+boundary+'--'
    ].join('\r\n');
    const r=await driveRequest(
      `https://www.googleapis.com/upload/drive/v3/files/${gFileId}?uploadType=multipart`,
      'PATCH',body,true
    );
    // Override content-type for multipart
    const headers={'Authorization':'Bearer '+gAccessToken,'Content-Type':'multipart/related; boundary='+boundary};
    await fetch(`https://www.googleapis.com/upload/drive/v3/files/${gFileId}?uploadType=multipart`,
      {method:'PATCH',headers,body});
    const ns={...state.settings,lastSync:new Date().toISOString(),googleConnected:true};
    state.settings=ns;saveSettings(ns);
    setState({syncStatus:'ok'});
    if(manual)showToast('Sauvegardé sur Drive ✓',true,3000);
    setTimeout(()=>setState({syncStatus:null}),4000);
  }catch(e){
    console.error('syncToGoogleDrive:',e);
    setState({syncStatus:'err'});
    if(manual)showToast('Erreur sync Drive : '+e.message.slice(0,40),false,4000);
    setTimeout(()=>setState({syncStatus:null}),4000);
  }
}

async function restoreFromGoogleDrive(){
  if(!gAccessToken){showToast('Connecte d\'abord Google Drive',false,3000);return;}
  setState({syncStatus:'syncing'});
  try{
    await findOrCreateDriveFile();
    const r=await driveRequest(`https://www.googleapis.com/drive/v3/files/${gFileId}?alt=media`);
    const data=await r.json();
    if(!data.accounts){showToast('Fichier Drive vide ou invalide',false,3000);setState({syncStatus:null});return;}
    if(!confirm('Remplacer tes données locales par celles du Drive ?'))return;
    state.accounts=(data.accounts||[]).map(a=>({...a,isSavings:a.isSavings===true}));
    state.envelopes=data.envelopes||[];
    state.txs=data.txs||[];
    state.debts=data.debts||[];
    state.owedDebts=data.owedDebts||[];
    setState({syncStatus:'ok'});
    showToast('Données restaurées depuis Drive ✓',true,4000);
    setTimeout(()=>setState({syncStatus:null}),4000);
  }catch(e){
    setState({syncStatus:null});
    showToast('Erreur restauration',false,3000);
  }
}

function autoSyncIfNeeded(){
  if(!gAccessToken||!state.settings.autoSync)return;
  const last=state.settings.lastSync;
  if(!last){syncToGoogleDrive(false);return;}
  const diff=(Date.now()-new Date(last).getTime())/(1000*60*60);
  if(diff>=24)syncToGoogleDrive(false);
}



/* ===================== SUPPRESSION / ÉDITION TRANSACTION ===================== */

function canEditTx(tx){
  if(!tx.date)return false;
  const diff=(Date.now()-new Date(tx.date).getTime())/(1000*60*60*24);
  return diff<=7;
}

function reverseTxEffects(tx){
  const tp=TYPES.find(x=>x.id===tx.typeId);
  if(!tp)return;
  const amt=tx.amount;
  if(tp.dir==='in'){
    state.accounts=state.accounts.map(a=>a.id===tx.accId?{...a,bal:+(a.bal-amt).toFixed(2)}:a);
    if(tp.env==='auto')state.envelopes=state.envelopes.map(e=>({...e,bal:+(e.bal-amt*e.rate).toFixed(2)}));
    if(tx.typeId==='rembRecv'&&tx.person){
      state.debts=state.debts.map(d=>
        d.person.toLowerCase()===tx.person.toLowerCase()
          ?{...d,rem:+(d.rem+amt).toFixed(2),history:(d.history||[]).filter(h=>h.id!==tx.id)}:d);
    }
    if(tx.typeId==='emprunt'&&tx.person){
      state.owedDebts=state.owedDebts.map(d=>
        d.creditor.toLowerCase()===tx.person.toLowerCase()
          ?{...d,rem:+(d.rem-amt).toFixed(2),total:+(d.total-amt).toFixed(2)}:d
      ).filter(d=>d.total>0);
    }
  }else if(tp.dir==='out'){
    state.accounts=state.accounts.map(a=>a.id===tx.accId?{...a,bal:+(a.bal+amt).toFixed(2)}:a);
    if(tp.env&&tp.env!=='auto')state.envelopes=state.envelopes.map(e=>e.id===tp.env?{...e,bal:+(e.bal+amt).toFixed(2)}:e);
    if(tx.typeId==='pret'&&tx.person){
      state.debts=state.debts.map(d=>
        d.person.toLowerCase()===tx.person.toLowerCase()
          ?{...d,rem:+(d.rem-amt).toFixed(2),total:+(d.total-amt).toFixed(2)}:d
      ).filter(d=>d.total>0);
    }
    if(tx.typeId==='rembDonne'&&tx.person){
      state.owedDebts=state.owedDebts.map(d=>
        d.creditor.toLowerCase()===tx.person.toLowerCase()
          ?{...d,rem:+(d.rem+amt).toFixed(2),history:(d.history||[]).filter(h=>h.id!==tx.id)}:d);
    }
  }else if(tp.dir==='xfr'){
    state.accounts=state.accounts.map(a=>{
      if(a.id===tx.fromId)return{...a,bal:+(a.bal+amt).toFixed(2)};
      if(a.id===tx.toId)return{...a,bal:+(a.bal-amt).toFixed(2)};
      return a;
    });
  }
}

function deleteTx(txId){
  const tx=state.txs.find(x=>x.id===txId);
  if(!tx)return;
  reverseTxEffects(tx);
  state.txs=state.txs.filter(x=>x.id!==txId);
  setState({txModal:null});
  showToast('Opération annulée ✓',true);
}

function applyTxEdit(txId,newAmt,newDesc){
  const tx=state.txs.find(x=>x.id===txId);
  if(!tx)return;
  reverseTxEffects(tx);
  const updated={...tx,amount:newAmt,desc:newDesc,editedAt:new Date().toISOString()};
  state.txs=state.txs.map(x=>x.id===txId?updated:x);
  const tp=TYPES.find(x=>x.id===updated.typeId);
  if(tp){
    if(tp.dir==='in'){
      state.accounts=state.accounts.map(a=>a.id===updated.accId?{...a,bal:+(a.bal+newAmt).toFixed(2)}:a);
      if(tp.env==='auto')state.envelopes=state.envelopes.map(e=>({...e,bal:+(e.bal+newAmt*e.rate).toFixed(2)}));
    }else if(tp.dir==='out'){
      state.accounts=state.accounts.map(a=>a.id===updated.accId?{...a,bal:+(a.bal-newAmt).toFixed(2)}:a);
      if(tp.env&&tp.env!=='auto')state.envelopes=state.envelopes.map(e=>e.id===tp.env?{...e,bal:+(e.bal-newAmt).toFixed(2)}:e);
    }else if(tp.dir==='xfr'){
      state.accounts=state.accounts.map(a=>{
        if(a.id===updated.fromId)return{...a,bal:+(a.bal-newAmt).toFixed(2)};
        if(a.id===updated.toId)return{...a,bal:+(a.bal+newAmt).toFixed(2)};
        return a;
      });
    }
  }
  setState({txModal:null});
  showToast('Opération modifiée ✓',true);
}

function buildTxImpact(tx){
  const tp=TYPES.find(x=>x.id===tx.typeId);
  const lines=[];
  const getAcc=id=>state.accounts.find(a=>a.id===id);
  if(tp?.dir==='in'){
    const ac=getAcc(tx.accId);
    if(ac)lines.push('Compte '+ac.name+' : '+eur(ac.bal)+' → '+eur(+(ac.bal-tx.amount).toFixed(2)));
    if(tp.env==='auto')state.envelopes.forEach(e=>
      lines.push('Enveloppe '+e.name+' : '+eur(e.bal)+' → '+eur(+(e.bal-tx.amount*e.rate).toFixed(2))));
    if(tx.typeId==='rembRecv'&&tx.person)lines.push('⚠ Dette de '+tx.person+' réouverte de '+eur(tx.amount));
    if(tx.typeId==='emprunt'&&tx.person)lines.push('⚠ Emprunt de '+tx.person+' réduit de '+eur(tx.amount));
  }else if(tp?.dir==='out'){
    const ac=getAcc(tx.accId);
    if(ac)lines.push('Compte '+ac.name+' : '+eur(ac.bal)+' → '+eur(+(ac.bal+tx.amount).toFixed(2)));
    if(tp.env&&tp.env!=='auto'){const e=state.envelopes.find(x=>x.id===tp.env);if(e)lines.push('Enveloppe '+e.name+' : '+eur(e.bal)+' → '+eur(+(e.bal+tx.amount).toFixed(2)));}
    if(tx.typeId==='pret'&&tx.person)lines.push('⚠ Prêt à '+tx.person+' supprimé des dettes');
    if(tx.typeId==='rembDonne'&&tx.person)lines.push('⚠ Remboursement à '+tx.person+' annulé');
  }else if(tp?.dir==='xfr'){
    const fa=getAcc(tx.fromId),ta=getAcc(tx.toId);
    if(fa)lines.push('Compte '+fa.name+' : '+eur(fa.bal)+' → '+eur(+(fa.bal+tx.amount).toFixed(2)));
    if(ta)lines.push('Compte '+ta.name+' : '+eur(ta.bal)+' → '+eur(+(ta.bal-tx.amount).toFixed(2)));
  }
  return lines;
}

/* ===================== PAGE HISTORIQUE ===================== */
function renderHistory(){
  const {txs,histFilter,accounts,txModal}=state;
  const getAcc=id=>accounts.find(a=>a.id===id);

  if(txModal){
    const tx=txModal;
    const tp=TYPES.find(x=>x.id===tx.typeId);
    const isIn=tp?.dir==='in';const isX=tp?.dir==='xfr';
    const impacts=buildTxImpact(tx);
    let editDesc=tx.desc||'';
    // Calcul apercu patrimoine avant/apres
    const patrimoineActuel=state.accounts.reduce((s,a)=>s+a.bal,0);
    const w=el('div',{style:{paddingBottom:20,color:TXT}});
    const bb=el('button',{style:{background:'none',border:'none',color:MUT2,fontSize:13,
      cursor:'pointer',padding:'18px 16px 6px',display:'flex',alignItems:'center',gap:5,
      fontFamily:'inherit'}},'\u2190 Retour');
    bb.addEventListener('click',()=>setState({txModal:null}));w.appendChild(bb);
    const cv=el('div',{style:{padding:'0 16px'}});
    // Header
    const hd=el('div',{style:{display:'flex',alignItems:'center',gap:10,marginBottom:12}});
    const ico=el('div',{style:{width:40,height:40,borderRadius:11,
      background:(tp?.color||'#64748b')+'22',display:'flex',alignItems:'center',
      justifyContent:'center',flexShrink:0}});
    ico.appendChild(el('span',{style:{fontSize:11,fontWeight:800,color:tp?.color||MUT}},tp?.abbr||'?'));
    hd.appendChild(ico);
    const hdInfo=el('div');
    hdInfo.appendChild(el('div',{style:{fontSize:16,fontWeight:700}},tp?.label||tx.typeId));
    hdInfo.appendChild(el('div',{style:{fontSize:11,color:MUT,marginTop:2}},
      tx.date+(tx.person?' \u00b7 '+tx.person:'')));
    hd.appendChild(hdInfo);cv.appendChild(hd);
    cv.appendChild(el('div',{style:{fontSize:28,fontWeight:800,
      color:isIn?'#34d399':isX?MUT2:'#f87171',marginBottom:14,
      paddingBottom:14,borderBottom:'1px solid '+BORDER}},
      (isIn?'+':isX?'':'\u2212')+eur(tx.amount)));

    // === SECTION MODIFICATION ===
    cv.appendChild(el('div',{style:{fontSize:10,color:MUT2,fontWeight:700,
      letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:8}},'Modifier'));
    const amtI=el('input',{type:'number',inputMode:'decimal',
      style:{width:'100%',background:BG,border:'1px solid '+BORDER,borderRadius:10,
        padding:'11px 13px',color:TXT,fontSize:18,fontWeight:700,outline:'none',marginBottom:8}});
    amtI.value=tx.amount;
    // Apercu impact modification
    const editPreview=el('div',{style:{fontSize:11,color:MUT,marginBottom:8,display:'none'}});
    amtI.addEventListener('input',()=>{
      const newA=parseFloat(amtI.value)||0;
      if(newA>0&&newA!==tx.amount){
        const diff=isIn?(newA-tx.amount):(tx.amount-newA);
        const newPat=+(patrimoineActuel+diff).toFixed(2);
        editPreview.style.display='block';
        editPreview.style.color=diff>0?'#34d399':'#f87171';
        editPreview.textContent='Patrimoine : '+eur(patrimoineActuel)+' \u2192 '+eur(newPat)+
          (diff>0?' (+'+eur(diff)+')':' ('+eur(diff)+')');
      }else{editPreview.style.display='none';}
    });
    const descI=el('input',{type:'text',placeholder:'Description...',
      style:{width:'100%',background:BG,border:'1px solid '+BORDER,borderRadius:10,
        padding:'11px 13px',color:TXT,fontSize:14,outline:'none',marginBottom:8}});
    descI.value=tx.desc||'';
    descI.addEventListener('input',e=>{editDesc=e.target.value;});
    cv.appendChild(amtI);
    cv.appendChild(editPreview);
    cv.appendChild(descI);
    const saveBtn=mkBtn('\u2713 Enregistrer la modification','#3b82f6',()=>{
      const a=parseFloat(amtI.value.replace(',','.'))||0;
      if(a<=0){showToast('Montant invalide',false);return;}
      if(a===tx.amount&&editDesc.trim()===(tx.desc||'').trim()){showToast('Aucun changement',false);return;}
      applyTxEdit(tx.id,a,editDesc.trim());
    });
    cv.appendChild(saveBtn);
    cv.appendChild(el('div',{style:{height:1,background:BORDER,margin:'16px 0'}}));

    // === SECTION SUPPRESSION ===
    cv.appendChild(el('div',{style:{fontSize:10,color:'#fca5a5',fontWeight:700,
      letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:8}},
      'Annuler cette op\u00e9ration'));
    // Apercu effets
    const impBox=el('div',{style:{background:'#3b1a1a',border:'1px solid #7f1d1d',
      borderRadius:10,padding:'10px 12px',marginBottom:12}});
    if(impacts.length===0){
      impBox.appendChild(el('div',{style:{fontSize:11,color:MUT}},
        'Aucun effet direct sur les soldes.'));
    }else{
      impacts.forEach(line=>{
        impBox.appendChild(el('div',{style:{fontSize:11,color:'#fca5a5',
          marginBottom:4,lineHeight:1.5}},line));
      });
    }
    cv.appendChild(impBox);

    // Bouton 2 etapes (sans confirm() bloque sur mobile)
    let delArmed=false,delTimer=null;
    const delBtn=el('button',{style:{width:'100%',background:'#3b1a1a',
      border:'1px solid #7f1d1d',borderRadius:12,padding:'12px',fontSize:14,
      fontWeight:700,color:'#fca5a5',cursor:'pointer',fontFamily:'inherit',
      touchAction:'manipulation',transition:'all 0.2s'}},
      '\u26a0 Supprimer et annuler les effets');
    delBtn.addEventListener('click',()=>{
      if(!delArmed){
        // 1er clic : armer
        delArmed=true;
        delBtn.style.background='#7f1d1d';
        delBtn.style.border='1px solid #ef4444';
        delBtn.style.color='white';
        delBtn.textContent='\u2757 Appuie encore pour confirmer (3s)';
        delTimer=setTimeout(()=>{
          delArmed=false;
          delBtn.style.background='#3b1a1a';
          delBtn.style.border='1px solid #7f1d1d';
          delBtn.style.color='#fca5a5';
          delBtn.textContent='\u26a0 Supprimer et annuler les effets';
        },3000);
      }else{
        // 2eme clic : confirmer
        clearTimeout(delTimer);
        deleteTx(tx.id);
      }
    });
    cv.appendChild(delBtn);
    w.appendChild(cv);return w;
  }

  const shown=histFilter==='all'?txs:txs.filter(tx=>{
    const t=TYPES.find(x=>x.id===tx.typeId);
    return histFilter==='in'?t?.dir==='in':histFilter==='out'?t?.dir==='out':t?.dir==='xfr';
  });
  const wrap=el('div',{style:{paddingBottom:20,color:TXT}});
  wrap.appendChild(el('div',{style:{padding:'18px 16px 10px',fontSize:17,fontWeight:700}},
    'Historique ('+txs.length+')'));
  const filters=el('div',{style:{display:'flex',gap:6,padding:'0 16px 12px',
    overflowX:'auto',scrollbarWidth:'none'}});
  [['all','Tout'],['in','Entrées'],['out','Sorties'],['xfr','Virements']].forEach(([id,lb])=>{
    const a=histFilter===id;
    const b=el('button',{style:{background:a?'#3b82f6':CARD,border:'1px solid '+(a?'#3b82f6':BORDER),
      borderRadius:18,padding:'5px 11px',color:a?'white':MUT2,fontSize:11,
      cursor:'pointer',fontWeight:a?700:400,whiteSpace:'nowrap'}},lb);
    b.addEventListener('click',()=>setState({histFilter:id}));filters.appendChild(b);
  });
  wrap.appendChild(filters);
  if(!shown.length){
    const e=el('div',{style:{textAlign:'center',padding:'60px 20px',color:MUT}});
    e.appendChild(el('div',{style:{fontSize:32,fontWeight:800,color:BORDER,marginBottom:10}},'\u00d8'));
    e.appendChild(el('div',null,'Aucune opération'));
    wrap.appendChild(e);return wrap;
  }
  const list=el('div',{style:{padding:'0 16px',display:'flex',flexDirection:'column',gap:7}});
  shown.forEach(tx=>{
    const tp=TYPES.find(x=>x.id===tx.typeId);
    const isIn=tp?.dir==='in';const isX=tp?.dir==='xfr';
    const ac=getAcc(tx.accId);const fa=getAcc(tx.fromId);const ta=getAcc(tx.toId);
    const editable=canEditTx(tx);
    const row=el('div',{style:{background:CARD,borderRadius:14,padding:'11px 13px',
      border:'1px solid '+(editable?'#3d4f6b':BORDER),
      display:'flex',justifyContent:'space-between',alignItems:'center'}});
    const left=el('div',{style:{display:'flex',alignItems:'center',gap:9,overflow:'hidden',flex:1}});
    const ico=el('div',{style:{width:34,height:34,borderRadius:9,
      background:(tp?.color||'#64748b')+'22',display:'flex',alignItems:'center',
      justifyContent:'center',flexShrink:0}});
    ico.appendChild(el('span',{style:{fontSize:9,fontWeight:800,color:tp?.color||MUT}},tp?.abbr||'?'));
    left.appendChild(ico);
    const info=el('div',{style:{overflow:'hidden'}});
    info.appendChild(el('div',{style:{fontSize:13,fontWeight:600,color:TXT,whiteSpace:'nowrap',
      overflow:'hidden',textOverflow:'ellipsis'}},tx.desc||tp?.label));
    const sub=el('div',{style:{fontSize:10,color:MUT,marginTop:1,whiteSpace:'nowrap',
      overflow:'hidden',textOverflow:'ellipsis'}});
    sub.textContent=(tx.date||'')+' · '+(isX?(fa?.name||'?')+'→'+(ta?.name||'?'):(ac?.name||''))+(tx.person?' · '+tx.person:'')+(tx.editedAt?' · ✏':'');
    info.appendChild(sub);left.appendChild(info);
    row.appendChild(left);
    const right=el('div',{style:{display:'flex',alignItems:'center',gap:7,flexShrink:0,marginLeft:6}});
    right.appendChild(el('div',{style:{fontSize:13,fontWeight:800,
      color:isIn?'#34d399':isX?MUT2:'#f87171',whiteSpace:'nowrap'}},
      (isIn?'+':isX?'':'−')+eur(tx.amount)));
    if(editable){
      const editBtn=el('button',{style:{width:28,height:28,borderRadius:8,background:'#1e293b',
        display:'flex',alignItems:'center',justifyContent:'center',
        border:'1px solid #334155',cursor:'pointer',flexShrink:0,touchAction:'manipulation',
        fontFamily:'inherit',fontSize:13,color:MUT2}},'\u270f');
      editBtn.addEventListener('click',e=>{e.stopPropagation();setState({txModal:tx});});
      right.appendChild(editBtn);
    }
    row.appendChild(right);
    list.appendChild(row);
  });
  wrap.appendChild(list);
  return wrap;
}

      opt1.appendChild(o1t);opt1.appendChild(o1d);
      opt1.addEventListener('click',()=>repayDebt(d.id,String(d.rem),ov.accId,ov.note,'cap'));
      cv.appendChild(opt1);

    bb.addEventListener('click',()=>setState({debtModal:null}));w.appendChild(bb);

    const soldBtn=el('button',{style:{display:'block',margin:'0 16px 12px',background:'#022c22',border:'1px solid #10b981',borderRadius:9,padding:'7px 14px',color:'#34d399',fontSize:11,fontWeight:700,cursor:'pointer',fontFamily:'inherit'}},'Saisir le montant total restant ('+eur(d.rem)+')');

  if(debtAdding){

      const hist=el('div',{style:{borderTop:'1px solid '+BORDER,marginTop:10,paddingTop:8,marginBottom:8}});
      hist.appendChild(el('div',{style:{fontSize:9,color:MUT,fontWeight:700,letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:5}},'Remboursements'));
      d.history.slice(0,3).forEach(h=>{
        const hr=el('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:3}});
        hr.appendChild(el('span',{style:{fontSize:11,color:MUT2}},h.date+(h.note?' — '+h.note:'')));
        hr.appendChild(el('span',{style:{fontSize:11,fontWeight:700,color:'#34d399'}},'+'+eur(h.amount)));
        hist.appendChild(hr);
      });
      if(d.history.length>3)hist.appendChild(el('div',{style:{fontSize:10,color:MUT}},('+'+(d.history.length-3)+' autre(s)')));
      c.appendChild(hist);
    }
    const br=el('div',{style:{display:'flex',gap:7}});
    const bb=el('button',{style:{flex:1,background:'#022c22',border:'1px solid #10b981',borderRadius:9,padding:'9px',color:'#34d399',fontSize:12,fontWeight:700,cursor:'pointer',touchAction:'manipulation'}},'Enregistrer remboursement');
    bb.addEventListener('click',()=>setState({debtModal:d}));
    const bd=el('button',{style:{background:BG,border:'1px solid '+BORDER,borderRadius:9,padding:'9px 13px',color:MUT,fontSize:11,cursor:'pointer',touchAction:'manipulation'}},'✕');
    bd.addEventListener('click',()=>{if(confirm('Supprimer ce prêt ?')){state.debts=state.debts.filter(x=>x.id!==d.id);setState({});}});
    br.appendChild(bb);br.appendChild(bd);c.appendChild(br);list.appendChild(c);
  });
  if(done.length){list.appendChild(secTitle('Soldés'));done.forEach(d=>{const c=el('div',{style:{background:CARD,borderRadius:14,padding:'12px 14px',border:`1px solid ${BORDER}`,display:'flex',justifyContent:'space-between',opacity:0.5}});c.appendChild(el('span',{style:{fontSize:13,color:MUT}},d.person));c.appendChild(el('span',{style:{fontSize:13,color:'#34d399',fontWeight:600}},'✓ '+eur(d.total)));list.appendChild(c);});}
  const ab=el('button',{style:{background:'#1e3a5f',border:'1px solid #3b82f6',borderRadius:12,padding:13,fontSize:13,color:'#93c5fd',cursor:'pointer',width:'100%',marginTop:4,fontWeight:700,touchAction:'manipulation',fontFamily:'inherit'}},'+ Nouveau prêt');
  ab.addEventListener('click',()=>setState({debtAdding:true,debtForm:{np:'',na:'',nn:'',acc:''}}));list.appendChild(ab);
  w.appendChild(list);return w;
}

  emailCard.appendChild(emailTimeRow);

  // Bouton test email
  const testEmailBtn=el('button',{style:{width:'100%',background:settings.emailReminder&&settings.notifEmail?'#1e3a5f':BG,border:'1px solid '+(settings.emailReminder&&settings.notifEmail?'#3b82f6':BORDER),borderRadius:9,padding:'9px 14px',color:settings.emailReminder&&settings.notifEmail?'#93c5fd':MUT,fontSize:12,cursor:'pointer',touchAction:'manipulation',fontFamily:'inherit',marginBottom:10}},'Envoyer un email de test maintenant');
  testEmailBtn.addEventListener('click',async()=>{
    const url=state.settings.driveUrl.trim();
    const email=state.settings.notifEmail.trim();
    if(!url){showToast('Configure l\u2019URL Apps Script dans R\u00e9glages',false);return;}
    if(!email){showToast('Entre d\u2019abord ton email',false);return;}
    testEmailBtn.textContent='Envoi en cours...';
    testEmailBtn.disabled=true;
    try{
      // no-cors POST : fonctionne depuis n'importe quelle origine (GitHub Pages, local...)
      await fetch(url,{
        method:'POST',
        mode:'no-cors',
        body:JSON.stringify({
          accounts:state.accounts,envelopes:state.envelopes,
          txs:state.txs,debts:state.debts,
          reminderEmail:email,
          reminderTime:state.settings.emailTime||'08:00',
          emailReminder:true,
          sendTestEmail:true,
          syncedAt:new Date().toISOString()
        })
      });
      // no-cors = on ne peut pas lire la r\u00e9ponse, mais la requ\u00eate est partie
      showToast('Requ\u00eate envoy\u00e9e \u2713 V\u00e9rifie ta bo\u00eete mail dans 1 min',true,5000);
    }catch(err){
      showToast('Impossible de joindre le script. V\u00e9rifie l\u2019URL Drive.',false,5000);
    }
    testEmailBtn.textContent='Envoyer un email de test maintenant';
    testEmailBtn.disabled=false;
  });
  emailCard.appendChild(testEmailBtn);

  emailCard.appendChild(el('div',{style:{fontSize:10,color:MUT,lineHeight:1.6}},'Le script Google Apps doit \u00eatre d\u00e9ploy\u00e9 et actif. Apr\u00e8s avoir chang\u00e9 l\u2019heure, appuie sur "Sync Drive" pour que le script prenne en compte le nouvel horaire.'));
  notifWrap.appendChild(emailCard);

  w.appendChild(notifWrap);

  /* --- RÉINITIALISATION COMPLÈTE --- */
  w.appendChild(secTitle('Zone de danger'));
  w.appendChild(el('div',{style:{padding:'0 16px'}},
    mkBtn('Réinitialiser TOUT (comptes + données)','#7f1d1d',()=>{
      if(confirm('Effacer absolument tout, y compris la structure des comptes ?')){
        state.accounts=INIT_ACCOUNTS;state.envelopes=INIT_ENVELOPES;state.txs=[];state.debts=INIT_DEBTS;state.owedDebts=[];
        setState({});showToast('Réinitialisé complètement',false);
      }
    },{border:'1px solid #dc2626',fontSize:13})
  ));

  return w;
}


/* ===================== RENDU PRINCIPAL ===================== */
function render(){
  const root=document.getElementById('root');
  root.innerHTML='';
  const app=el('div',{style:{height:'100%',display:'flex',flexDirection:'column',background:BG}});
  const content=el('div',{style:{flex:1,overflowY:'auto',scrollbarWidth:'none',WebkitOverflowScrolling:'touch'}});
  // Wizard premier lancement
  if(state.wizard){
    const wEl=renderWizard();
    app.appendChild(wEl);
    root.appendChild(app);
    return;
  }
  const {tab}=state;
  if(tab==='home')content.appendChild(renderHome());
  else if(tab==='add')content.appendChild(renderAdd());
  else if(tab==='history')content.appendChild(renderHistory());
  else if(tab==='debts')content.appendChild(renderDebts());
  else if(tab==='settings')content.appendChild(renderSettings());
  app.appendChild(content);
  const nav=el('div',{style:{background:'#1e293b',borderTop:`1px solid ${BORDER}`,display:'flex',paddingBottom:'env(safe-area-inset-bottom)'}});
  [['home','⌂','Accueil'],['add','+','Saisir'],['history','≡','Historique'],['debts','$','Dettes'],['settings','⚙','Réglages']].forEach(([id,sym,label])=>{
    const active=tab===id;
    const b=el('button',{style:{flex:1,border:'none',background:'none',color:active?'#60a5fa':'#475569',display:'flex',flexDirection:'column',alignItems:'center',gap:2,cursor:'pointer',padding:'9px 0 7px'}});
    b.appendChild(el('span',{style:{fontSize:18,fontWeight:700,lineHeight:1}},sym));
    b.appendChild(el('span',{style:{fontSize:8,fontWeight:active?700:400,letterSpacing:'0.03em'}},label));
    b.addEventListener('click',()=>setState({tab:id}));nav.appendChild(b);
  });
  app.appendChild(nav);root.appendChild(app);
}

function fixViewport(){
  var vh = window.innerHeight * 0.01;
  document.documentElement.style.setProperty('--real-vh', vh + 'vh');
  var root = document.getElementById('root');
  if(root) root.style.height = window.innerHeight + 'px';
}
fixViewport();
window.addEventListener('resize', fixViewport);
window.addEventListener('orientationchange', function(){ setTimeout(fixViewport, 150); });
init();
// Init Google Auth quand la librairie est prête
window.addEventListener('load',()=>{
  setTimeout(initGoogleAuth,500);
  autoSyncIfNeeded();
});
</script>
</body>
</html>
